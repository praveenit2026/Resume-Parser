version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - SAMBANOVA_BASE_URL=${SAMBANOVA_BASE_URL:-https://api.sambanova.ai/v1}
      - SAMBANOVA_MODEL=${SAMBANOVA_MODEL:-Meta-Llama-3.1-70B-Instruct}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
